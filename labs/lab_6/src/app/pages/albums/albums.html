<div class="p-4">
  <h1 class="text-2xl font-bold mb-4">Albums List</h1>

  @if (isLoading) {
    <p class="text-gray-500">Loading albums...</p>
  } @else {
    <div class="flex flex-col gap-2">
      @for (album of albums; track album.id) {
        <div
          class="border p-3 rounded flex justify-between items-center bg-gray-50 hover:bg-gray-100"
        >
          <a
            [routerLink]="['/albums', album.id]"
            class="grow cursor-pointer text-blue-600 hover:underline"
          >
            <span class="font-bold mr-2">ID: {{ album.id }}</span>
            {{ album.title }}
          </a>

          <button
            (click)="deleteAlbum(album.id)"
            class="bg-red-500 text-white px-3 py-1 rounded text-sm hover:bg-red-600"
          >
            Delete
          </button>
        </div>
      }
    </div>
  }
</div>
